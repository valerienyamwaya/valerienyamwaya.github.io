---
layout: default
---
{% if page.image %}
<figure class="post-cover hero">
  <picture>
    {% assign webp = page.image | replace: '.jpg', '.webp' | replace: '.jpeg', '.webp' %}
    <source type="image/webp" srcset="{{ webp | relative_url }}">
    <img src="{{ page.image | relative_url }}" alt="{{ page.alt | escape }}" class="hero-image" />
  </picture>
  <figcaption class="cover-caption">{{ page.caption }}</figcaption>

  <div class="hero-overlay">
    <div class="hero-text inner">
      <h1 class="hero-title">{{ page.title }}</h1>
      <p class="hero-sub">{{ page.excerpt }}</p>
    </div>
  </div>
</figure>
{% endif %}

<article class="post-full inner">
  <p class="meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  <div class="post-content">
    {{ content }}
  </div>

  {% include author-bio.html %}

  <p><a href="{{ '/' | relative_url }}">← Back to Threads of Culture</a></p>
</article>
