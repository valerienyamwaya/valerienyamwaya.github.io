<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description }}">

  <!-- Open Graph / Social meta -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  {% if page.image %}
    {% assign img_path = page.image | relative_url %}
    {% assign webp_path = img_path | replace: '.jpg', '.webp' | replace: '.jpeg', '.webp' %}
    <meta property="og:image" content="{{ site.url }}{{ webp_path }}">
    <meta property="og:image:secure_url" content="{{ site.url }}{{ webp_path }}">
    <meta property="og:image:width" content="1600">
    <meta property="og:image:height" content="900">
    <meta name="twitter:image" content="{{ site.url }}{{ webp_path }}">
  {% endif %}
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.excerpt | default: site.description }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p class="site-subtitle">{{ site.description }}</p>
    </div>
  </header>

  <main class="site-main inner">
    {{ content }}
  </main>

  <footer class="site-footer inner">
    <p>© {{ "now" | date: "%Y" }} {{ site.title }} — Built with Jekyll</p>
  </footer>
</body>
</html>
